# =============================================================================
#  DupeCheck — CI/CD
#
#  Every push to master and every pull request:
#    • Builds release + debug configurations
#    • Runs the full unit-test suite (headless, no display required)
#
#  Every version tag (v*):
#    • All of the above, plus
#    • Packages a distributable artifact per platform
#    • Creates a GitHub Release and attaches all artifacts
#
#  Platform matrix
#  ┌──────────────────────┬────────────────┬──────────────┬─────────────┐
#  │ Target               │ Runner         │ Qt arch      │ Artifact    │
#  ├──────────────────────┼────────────────┼──────────────┼─────────────┤
#  │ macOS arm64          │ macos-14       │ clang_arm64  │ .dmg        │
#  │ macOS x86_64         │ macos-13       │ clang_64     │ .dmg        │
#  │ Linux x86_64         │ ubuntu-24.04   │ gcc_64       │ .tar.gz     │
#  │ Linux aarch64        │ ubuntu-24.04-arm│ gcc_arm64   │ .tar.gz     │
#  │ Windows x86_64       │ windows-latest │ msvc2022_64  │ .zip        │
#  └──────────────────────┴────────────────┴──────────────┴─────────────┘
#
#  Note — macOS Universal Binary:
#    A fat (arm64 + x86_64) .app requires Qt universal libraries, which
#    aqtinstall does not currently provide as a single download.  The lipo
#    combine step is deferred to a future enhancement.  In the interim,
#    Intel Mac users use the x86_64 build; Apple Silicon users the arm64
#    build.  Either runs under Rosetta 2 for compatibility.
# =============================================================================

name: CI/CD

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

env:
  QT_VERSION: '6.9.3'

# ---------------------------------------------------------------------------
# Build + test job (all platforms)
# ---------------------------------------------------------------------------
jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:

          # ── macOS arm64 (Apple Silicon) ──────────────────────────────────
          - name:          macOS-arm64
            os:            macos-14
            qt-host:       mac
            qt-arch:       clang_arm64
            artifact-name: DupeCheck-macOS-arm64
            artifact-ext:  dmg

          # ── macOS x86_64 (Intel) ─────────────────────────────────────────
          - name:          macOS-x86_64
            os:            macos-13
            qt-host:       mac
            qt-arch:       clang_64
            artifact-name: DupeCheck-macOS-x86_64
            artifact-ext:  dmg

          # ── Linux x86_64 ─────────────────────────────────────────────────
          - name:          Linux-x86_64
            os:            ubuntu-24.04
            qt-host:       linux
            qt-arch:       gcc_64
            artifact-name: DupeCheck-Linux-x86_64
            artifact-ext:  tar.gz

          # ── Linux aarch64 (native ARM64 runner) ──────────────────────────
          - name:          Linux-aarch64
            os:            ubuntu-24.04-arm
            qt-host:       linux_arm64
            qt-arch:       gcc_arm64
            artifact-name: DupeCheck-Linux-aarch64
            artifact-ext:  tar.gz

          # ── Windows x86_64 (MSVC 2022) ───────────────────────────────────
          - name:          Windows-x86_64
            os:            windows-latest
            qt-host:       windows
            qt-arch:       win64_msvc2022_64
            artifact-name: DupeCheck-Windows-x86_64
            artifact-ext:  zip

    steps:
      # ── Source ────────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── Qt ────────────────────────────────────────────────────────────────
      - name: Install Qt ${{ env.QT_VERSION }}
        uses: jurplel/install-qt-action@v4
        with:
          version:  ${{ env.QT_VERSION }}
          host:     ${{ matrix.qt-host }}
          target:   desktop
          arch:     ${{ matrix.qt-arch }}
          modules:  ''        # add extra Qt modules here if needed
          cache:    true      # cache the Qt download between runs

      # ── Platform prerequisites ────────────────────────────────────────────
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ninja-build \
            libgl1-mesa-dev libegl1-mesa-dev \
            libxkbcommon-dev libxkbcommon-x11-dev \
            libfontconfig1-dev libfreetype-dev \
            libx11-dev libxext-dev libxrender-dev libxi-dev \
            libxcb1-dev libx11-xcb-dev libxcb-glx0-dev \
            libxcb-keysyms1-dev libxcb-image0-dev libxcb-shm0-dev \
            libxcb-icccm4-dev libxcb-sync-dev libxcb-xfixes0-dev \
            libxcb-shape0-dev libxcb-randr0-dev libxcb-render-util0-dev \
            libxcb-xinerama0-dev libxcb-xkb-dev \
            libatspi2.0-dev

      - name: Install Ninja (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja

      # Set up MSVC compiler environment.  ilammy/msvc-dev-cmd calls
      # vcvarsall.bat and writes the resulting env vars to $GITHUB_ENV so
      # they persist to every subsequent step in this job.
      - name: Set up MSVC environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      # ── Configure ─────────────────────────────────────────────────────────
      # We bypass CMakePresets.json (which encodes local macOS paths) and use
      # QTDIR, exported by install-qt-action, as the Qt prefix.
      - name: Configure (release)
        run: >
          cmake -S . -B build/release
          -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          "-DCMAKE_PREFIX_PATH=${{ env.QTDIR }}"
          -DBUILD_TESTS=OFF

      - name: Build (release)
        run: cmake --build build/release --parallel

      - name: Configure (tests)
        run: >
          cmake -S . -B build/test
          -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          "-DCMAKE_PREFIX_PATH=${{ env.QTDIR }}"
          -DBUILD_TESTS=ON

      - name: Build (tests)
        run: cmake --build build/test --parallel

      # ── Test ──────────────────────────────────────────────────────────────
      # QT_QPA_PLATFORM=offscreen lets Qt run without a display server (X11 /
      # Wayland / Quartz) — required on all headless CI runners.
      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: ctest --test-dir build/test --output-on-failure --parallel 4

      # ── Package (release tags only) ───────────────────────────────────────
      - name: Package — macOS (.dmg)
        if: runner.os == 'macOS' && startsWith(github.ref, 'refs/tags/v')
        run: |
          macdeployqt build/release/dupecheck.app -dmg
          mv build/release/dupecheck.dmg ${{ matrix.artifact-name }}.dmg

      - name: Package — Linux (.tar.gz)
        if: runner.os == 'Linux' && startsWith(github.ref, 'refs/tags/v')
        run: |
          cmake --install build/release --prefix staging
          tar -czf ${{ matrix.artifact-name }}.tar.gz -C staging .

      - name: Package — Windows (.zip)
        if: runner.os == 'Windows' && startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force staging
          Copy-Item "build\release\dupecheck.exe" staging\
          windeployqt --release "staging\dupecheck.exe"
          Compress-Archive -Path staging\* -DestinationPath "${{ matrix.artifact-name }}.zip"

      # ── Upload artifact (release tags only) ───────────────────────────────
      - name: Upload artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: "${{ matrix.artifact-name }}.${{ matrix.artifact-ext }}"
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Release job — runs after all build jobs on a version tag
  # ---------------------------------------------------------------------------
  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to create a release and upload assets

    steps:
      - name: Download all release artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true  # flatten into a single directory

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.dmg
            *.tar.gz
            *.zip
          generate_release_notes: true
          draft: false
          # Tags containing a hyphen (e.g. v1.0.0-beta) are pre-releases.
          prerelease: ${{ contains(github.ref_name, '-') }}
